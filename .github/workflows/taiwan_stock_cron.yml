name: Taiwan Stock Auto Crawler

on:
  schedule:
    - cron: '0 8 * * 1-5'
  workflow_dispatch: # 允許手動強制觸發

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 顯式宣告寫入權限

    steps:
    - name: 檢查並載入專案原始碼
      uses: actions/checkout@v4
      with:
        # 💡 使用 GitHub 內建的權限金鑰進行驗證，徹底擺脫 128 錯誤
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 初始化 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 執行台股全市場自動抓取腳本
      run: python scraper.py

    - name: 自動將最新數據 Commit 並 Push 回儲存庫
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add data/*.json
        
        if git diff --staged --quiet; then
          echo "今日無新數據變動，無需更新儲存庫。"
        else
          git commit -m "Auto-update Taiwan stock data: $(date +'%Y-%m-%d')"
          git push origin main
        fi
